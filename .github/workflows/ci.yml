name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    env:
      # Tests run without the strict Alibaba stack or external credentials.
      DEMO_ALIBABA_STRICT_MODE: "false"
      DEMO_AI_FALLBACK_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: ./mvnw -B clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    # Build (without pushing) on PRs to main and pushes to main so packaging issues fail before merge.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agent-backend-demo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
