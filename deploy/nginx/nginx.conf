# Minimal reverse proxy for the agent backend. Terminate TLS here in production (see the commented
# 443 block) and keep the app on an internal network. Forwards the client IP and correlation id so
# audit logs and traces stay accurate.

upstream agent_backend {
    server app:8080;
}

server {
    listen 80;
    server_name _;

    # Cap request body size (documents are uploaded via the API; tune to your limit).
    client_max_body_size 32m;

    location / {
        proxy_pass http://agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite inbound X-Forwarded-For in production so client-supplied values cannot pollute audit IPs.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve an inbound correlation id or let the app mint one.
        proxy_set_header X-Request-Id $http_x_request_id;
        # SSE endpoints (chat/stream, workflow run events) need buffering off.
        proxy_buffering off;
        proxy_read_timeout 130s;
    }
}

