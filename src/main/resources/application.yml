server:
  port: 8080

spring:
  application:
    name: agent-backend-demo
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeVideoAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAsyncToolCallingManagerAutoConfiguration
  profiles:
    group:
      dev: dev,alibaba-strict,postgres,workflow-graph
  ai:
    mcp:
      client:
        enabled: ${DEMO_MCP_ENABLED:false}
        annotation-scanner:
          enabled: ${DEMO_MCP_ANNOTATION_SCANNER_ENABLED:false}
        toolcallback:
          enabled: ${DEMO_MCP_TOOLCALLBACK_ENABLED:${DEMO_MCP_ENABLED:false}}
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY:}}
      base-url: ${AI_DASHSCOPE_BASE_URL:}
      chat:
        completions-path: ${AI_DASHSCOPE_CHAT_COMPLETIONS_PATH:}
        options:
          model: ${AI_DASHSCOPE_CHAT_MODEL:qwen-plus}
  datasource:
    url: jdbc:h2:mem:agent_demo;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      repositories:
        enabled: false
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      # In-memory H2 default demo profile: Hibernate creates the schema so the app boots
      # out of the box. The postgres profile uses validate + Flyway-managed migrations.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  # Flyway is on the classpath for the postgres profile; the H2 demo manages its schema with
  # Hibernate ddl-auto, so Flyway is disabled by default and turned on only under postgres.
  flyway:
    enabled: false
  servlet:
    multipart:
      # Knowledge-base file uploads. Keep in sync with demo.knowledge.max-file-bytes.
      max-file-size: ${DEMO_KNOWLEDGE_MAX_FILE_SIZE:10MB}
      max-request-size: ${DEMO_KNOWLEDGE_MAX_REQUEST_SIZE:12MB}

# Actuator: /actuator/health and /healthz are public liveness/readiness probes that only expose
# UP/DOWN (show-details=never / show-components=never keeps model, vector store and configuration
# state out of the public response). metrics/prometheus/info are exposed but locked behind
# SCOPE_health.read by the actuator security filter chain, so they are never anonymous.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
  health:
    redis:
      enabled: ${DEMO_REDIS_HEALTH_ENABLED:false}
  info:
    env:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    # Surface the per-request correlation id (see CorrelationIdFilter) in every log line.
    level: "%5p [${spring.application.name:agent-backend-demo},%X{requestId:-}]"
  level:
    root: INFO
    com.example.agentdemo: INFO
    org.springframework.ai: INFO

demo:
  audit:
    trust-forwarded-headers: ${DEMO_AUDIT_TRUST_FORWARDED_HEADERS:false}
  security:
    # hmac: validate HS256 tokens with demo.security.jwt-secret (local/demo default).
    # issuer: back off the local decoder and let Spring Boot auto-configure an
    #         issuer-uri / jwk-set-uri resource-server decoder (recommended for prod).
    jwt-mode: ${DEMO_SECURITY_JWT_MODE:hmac}
    # Insecure built-in secret so the demo boots with `mvnw spring-boot:run`.
    # MUST be overridden in any non-local deployment (or switch to jwt-mode=issuer).
    jwt-secret: ${DEMO_SECURITY_JWT_SECRET:dev-local-insecure-jwt-secret-change-me-0123456789}
    dev-token:
      # Exposes GET /api/auth/dev-token so the bundled workbench can authenticate
      # against the secured API in local/demo mode. Explicitly enable only for trusted local/demo use.
      enabled: ${DEMO_SECURITY_DEV_TOKEN_ENABLED:false}
      ttl-minutes: ${DEMO_SECURITY_DEV_TOKEN_TTL_MINUTES:120}
    rate-limit:
      enabled: ${DEMO_SECURITY_RATE_LIMIT_ENABLED:true}
      backend: ${DEMO_SECURITY_RATE_LIMIT_BACKEND:memory}
      requests-per-minute: ${DEMO_SECURITY_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
  alibaba:
    strict-mode: ${DEMO_ALIBABA_STRICT_MODE:false}
  ai:
    fallback-enabled: ${DEMO_AI_FALLBACK_ENABLED:true}
    enable-thinking: ${AI_DASHSCOPE_ENABLE_THINKING:false}
    embedding-model: ${AI_DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
    embedding-dimension: ${AI_DASHSCOPE_EMBEDDING_DIMENSION:1024}
    embedding-base-url: ${AI_DASHSCOPE_EMBEDDING_BASE_URL:}
    max-tokens-per-call: ${DEMO_AI_MAX_TOKENS_PER_CALL:32000}
  chat:
    memory:
      max-messages: ${DEMO_CHAT_MEMORY_MAX_MESSAGES:20}
  knowledge:
    max-file-bytes: ${DEMO_KNOWLEDGE_MAX_FILE_BYTES:10485760}
    max-content-chars: ${DEMO_KNOWLEDGE_MAX_CONTENT_CHARS:500000}
    max-scanned-documents: ${DEMO_KNOWLEDGE_MAX_SCANNED_DOCUMENTS:5000}
    allowed-mime-types:
      - text/plain
      - text/markdown
      - text/csv
      - text/html
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - application/msword
      - application/vnd.ms-powerpoint
  rag:
    retriever: ${DEMO_RAG_RETRIEVER:dashvector}
    keyword-fallback-enabled: ${DEMO_RAG_KEYWORD_FALLBACK_ENABLED:true}
    chunk-size: ${DEMO_RAG_CHUNK_SIZE:800}
    chunk-overlap: ${DEMO_RAG_CHUNK_OVERLAP:120}
    top-k: ${DEMO_RAG_TOP_K:5}
  dashvector:
    endpoint: ${DASHVECTOR_ENDPOINT:}
    api-key: ${DASHVECTOR_API_KEY:}
    collection: ${DASHVECTOR_COLLECTION:agent_rag_docs}
    dimension: ${DASHVECTOR_DIMENSION:1024}
    metric: ${DASHVECTOR_METRIC:cosine}
  app:
    # Runtime invocations (run/chat/chat-stream) must use the published, immutable app revision.
    # Set false only for local/dev iteration on unpublished drafts.
    require-published-for-run: ${DEMO_APP_REQUIRE_PUBLISHED_FOR_RUN:true}
    max-run-input-bytes: ${DEMO_APP_MAX_RUN_INPUT_BYTES:65536}
    api-key:
      last-used-update-interval-seconds: ${DEMO_APP_API_KEY_LAST_USED_UPDATE_INTERVAL_SECONDS:60}
  workflow:
    runtime: ${DEMO_WORKFLOW_RUNTIME:simple}
    require-published-for-run: ${DEMO_WORKFLOW_REQUIRE_PUBLISHED_FOR_RUN:true}
    allow-inline-run: ${DEMO_WORKFLOW_ALLOW_INLINE_RUN:false}
    max-nodes: ${DEMO_WORKFLOW_MAX_NODES:100}
    max-edges: ${DEMO_WORKFLOW_MAX_EDGES:200}
    max-parallel-branches: ${DEMO_WORKFLOW_MAX_PARALLEL_BRANCHES:16}
    max-dynamic-items: ${DEMO_WORKFLOW_MAX_DYNAMIC_ITEMS:50}
    # Run-level execution budget: caps total node executions across the whole run (loops, dynamic
    # fan-out and nested subgraphs included) so a runaway run is aborted with WORKFLOW_BUDGET_EXCEEDED.
    max-step-executions: ${DEMO_WORKFLOW_MAX_STEP_EXECUTIONS:1000}
    # Wall-clock budget for a run in ms.
    run-deadline-ms: ${DEMO_WORKFLOW_RUN_DEADLINE_MS:120000}
  tools:
    allow-all-remote-tools: ${DEMO_TOOLS_ALLOW_ALL_REMOTE_TOOLS:false}
    allowed-remote-tools: ${DEMO_TOOLS_ALLOWED_REMOTE_TOOLS:}
    max-output-chars: ${DEMO_TOOLS_MAX_OUTPUT_CHARS:16384}
  mcp:
    enabled: ${DEMO_MCP_ENABLED:false}
  sse:
    timeout-ms: 120000
