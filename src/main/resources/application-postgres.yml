spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agent_demo}
    username: ${DB_USERNAME:agent_demo}
    password: ${DB_PASSWORD:agent_demo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
  # Version-managed schema: Flyway runs the db/migration scripts, then Hibernate validates.
  # baseline-on-migrate stamps an existing (pre-Flyway) database at V1 and applies V2 onwards.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
