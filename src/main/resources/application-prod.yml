demo:
  ai:
    max-tokens-per-call: ${DEMO_AI_MAX_TOKENS_PER_CALL:32000}
  security:
    jwt-mode: ${DEMO_SECURITY_JWT_MODE:issuer}
    dev-token:
      enabled: false
    rate-limit:
      enabled: true
      # Production deployments must use a shared limiter. Use redis for the built-in distributed
      # fixed-window limiter, or external only when a gateway enforces the same principal/method/path keys.
      backend: ${DEMO_SECURITY_RATE_LIMIT_BACKEND:redis}
  app:
    require-published-for-run: true
  workflow:
    require-published-for-run: true
    allow-inline-run: false
    run-deadline-ms: ${DEMO_WORKFLOW_RUN_DEADLINE_MS:120000}
    max-step-executions: ${DEMO_WORKFLOW_MAX_STEP_EXECUTIONS:1000}

spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  h2:
    console:
      enabled: false

management:
  health:
    redis:
      enabled: ${DEMO_REDIS_HEALTH_ENABLED:true}
